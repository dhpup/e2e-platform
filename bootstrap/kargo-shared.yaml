# TODO: set repoURL to your fork of e2e-platform
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-shared
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dhpup/e2e-platform
    targetRevision: HEAD
    path: kargo-shared
    directory:
      recurse: true
  destination:
    name: kargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
