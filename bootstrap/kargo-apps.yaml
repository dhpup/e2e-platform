# TODO: set repoURL to your fork of e2e-platform
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-apps
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/dhpup/e2e-platform
      revision: HEAD
      directories:
      - path: apps/*/kargo
  template:
    metadata:
      name: 'kargo-{{path[1]}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/dhpup/e2e-platform
        targetRevision: HEAD
        path: '{{path}}'
        directory:
          recurse: true
      destination:
        name: kargo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
