apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addon-argo-rollouts
  namespace: argocd
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet: "true"
  template:
    metadata:
      name: '{{name}}-argo-rollouts'
    spec:
      project: default
      source:
        repoURL: https://github.com/argoproj/argo-rollouts
        path: manifests
        targetRevision: stable
        directory:
          include: "install.yaml"
      destination:
        name: '{{name}}'
        namespace: argo-rollouts
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
