# CustomPromotionStep: oras-resolve
#
# Resolves an OCI tag to its manifest digest so that the argocd-update step
# can use the digest as desiredRevision — ArgoCD stores digests (not tags) in
# its sync status for OCI sources, so Kargo's revision health check requires
# the digest to avoid hanging indefinitely.
#
# Used by the test and stage pull-and-apply-oci task, which has no oras-push
# step to capture the digest from.
#
# Required config keys: registry, repository, tag, orasUsername, orasPassword
apiVersion: ee.kargo.akuity.io/v1alpha1
kind: CustomPromotionStep
metadata:
  name: oras-resolve
spec:
  image: ghcr.io/oras-project/oras:v1.2.2
  command:
    - /bin/sh
    - -c
    - |
      set -eu
      export DOCKER_CONFIG=/tmp/.docker
      mkdir -p /tmp/.docker
      echo "${{ config.orasPassword }}" | oras login "${{ config.registry }}" \
        --username "${{ config.orasUsername }}" \
        --password-stdin >/dev/null 2>&1

      DIGEST=$(oras manifest fetch \
        "${{ config.registry }}/${{ config.repository }}:${{ config.tag }}" \
        --descriptor \
        | grep -o '"digest":"sha256:[a-f0-9]*"' \
        | sed 's/"digest":"//;s/"//')

      printf '%s' "${DIGEST}"
  output:
    source:
      format: Text
      type: Stdout
    transform:
      digest: >-
        trim(output)
