# Grants the Kargo agent's service account permission to create and manage
# the backend infrastructure that Terraform provisions during promotions.
#
# The Kargo agent runs promotion steps (including tf-apply) using the service
# account of the agent pod in the akuity namespace. This ClusterRole gives it
# the minimum permissions needed for the team-daniel Terraform module.
#
# Verify the correct service account name with:
#   kubectl get pods -n akuity -l app.kubernetes.io/name=kargo-agent -o jsonpath='{.items[0].spec.serviceAccountName}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-daniel-terraform
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: team-daniel-terraform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: team-daniel-terraform
subjects:
# Update serviceAccountName to match your actual Kargo agent SA
- kind: ServiceAccount
  name: kargo-agent
  namespace: akuity
