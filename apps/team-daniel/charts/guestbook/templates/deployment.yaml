{{- if not .Values.useRollout }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
    spec:
      containers:
      - name: guestbook
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: feature-flags
        {{- if .Values.backend.redisUrl }}
        env:
        - name: BACKEND_URL
          value: {{ .Values.backend.redisUrl | quote }}
        {{- end }}
{{- end }}
