# Provisions per-stage backend infrastructure via Terraform (Kubernetes provider).
# Runs tf-apply to create a Redis service in k3d, extracts the endpoint,
# writes it to config.yaml, and commits the result (including TF state) to git.
#
# NOTE: The Kargo agent's service account needs permissions to create Namespaces,
# Deployments, and Services. Apply the RBAC in argocd/terraform-rbac.yaml if
# tf-apply fails with permission errors.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: provision-backend
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/dhpup/e2e-platform
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./out
  - uses: copy
    config:
      inPath: ./out/apps/team-daniel/env/${{ ctx.stage }}/backend.tf
      outPath: ./out/apps/team-daniel/terraform/backend.tf
  - uses: tf-apply
    config:
      dir: ./out/apps/team-daniel/terraform
      vars:
      - name: stage
        value: ${{ ctx.stage }}
      env:
      - name: KUBE_HOST
        value: "https://kubernetes.default.svc"
      - name: KUBE_TOKEN
        value: ${{ sharedSecret('k8s-tf-creds').token }}
      - name: KUBE_INSECURE_SKIP_TLS_VERIFY
        value: "true"
  - uses: tf-output
    as: infra
    config:
      dir: ./out/apps/team-daniel/terraform
      state: ../env/${{ ctx.stage }}/terraform.tfstate
  - uses: delete
    config:
      path: ./out/apps/team-daniel/terraform/backend.tf
  - uses: yaml-update
    config:
      path: ./out/apps/team-daniel/env/${{ ctx.stage }}/config.yaml
      updates:
      - key: backend.redisUrl
        value: ${{ task.outputs['infra'].redis_url }}
  - uses: git-commit
    as: commit
    config:
      path: ./out
      message: "${{ ctx.stage }}: provision backend (redis @ ${{ task.outputs['infra'].backend_namespace }})"
  - uses: git-push
    as: push
    config:
      path: ./out
      generateTargetBranch: true
  - uses: git-open-pr
    as: pr
    config:
      repoURL: ${{ vars.gitRepo }}
      sourceBranch: ${{ task.outputs['push'].branch }}
      targetBranch: main
      title: "${{ ctx.stage }}: provision backend infrastructure"
      description: |
        ## Terraform Apply — `${{ ctx.stage }}`

        ### Resources provisioned

        | Resource | Name | Namespace |
        |---|---|---|
        | `kubernetes_namespace` | `${{ task.outputs['infra'].backend_namespace }}` | — |
        | `kubernetes_deployment` | `redis` | `${{ task.outputs['infra'].backend_namespace }}` |
        | `kubernetes_service` | `redis` | `${{ task.outputs['infra'].backend_namespace }}` |

        ### Outputs

        | Field | Value |
        |---|---|
        | Image | `${{ task.outputs['infra'].redis_image }}` |
        | Host | `${{ task.outputs['infra'].redis_host }}` |
        | Port | `${{ task.outputs['infra'].redis_port }}` |
        | URL | `${{ task.outputs['infra'].redis_url }}` |

        ### Config change

        `env/${{ ctx.stage }}/config.yaml`

        ```yaml
        backend:
          redisUrl: "${{ task.outputs['infra'].redis_url }}"
        ```

        > Merge to apply this config to the `${{ ctx.stage }}` deployment.
  - if: ${{ task.outputs['pr'] != nil }}
    uses: git-wait-for-pr
    config:
      repoURL: ${{ vars.gitRepo }}
      prNumber: ${{ task.outputs['pr'].pr.id }}

---
# Promotes image tag and feature flags together as a unit.
apiVersion: kargo.akuity.io/v1alpha1
kind: PromotionTask
metadata:
  name: promote-guestbook
  namespace: team-daniel
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vars:
  - name: gitRepo
    value: https://github.com/dhpup/e2e-platform
  - name: imageRepo
    value: ghcr.io/akuity/guestbook
  steps:
  - uses: git-clone
    config:
      repoURL: ${{ vars.gitRepo }}
      checkout:
      - branch: main
        path: ./repo
  - uses: yaml-update
    config:
      path: ./repo/apps/team-daniel/env/${{ ctx.stage }}/image.yaml
      updates:
      - key: image.tag
        value: ${{ imageFrom(vars.imageRepo).Tag }}
  - uses: copy
    config:
      inPath: ./repo/apps/team-daniel/base/feature-flags.yaml
      outPath: ./repo/apps/team-daniel/env/${{ ctx.stage }}/feature-flags.yaml
  - uses: git-commit
    config:
      path: ./repo
      message: "${{ ctx.stage }}: promote"
  - uses: git-push
    config:
      path: ./repo
      targetBranch: main
  - uses: argocd-update
    config:
      apps:
      - name: team-daniel-${{ ctx.stage }}
