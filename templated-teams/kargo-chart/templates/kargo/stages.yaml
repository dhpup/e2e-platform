            namespace: argocd
{{ end }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: {{ .Values.application.name }}
  annotations:
    kargo.akuity.io/color: violet
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ .Values.application.name }}
    sources:
      stages:
      {{- if .Values.environments.staging }}
      - staging
      {{- else }}
      - dev
      {{- end }}
  - origin:
      kind: Warehouse
      name: '{{ .Values.application.name }}-chart'
    sources:
      stages:
      {{- if .Values.environments.staging }}
      - staging
      {{- else }}
      - dev
      {{- end }}
  promotionTemplate:
    spec:
      steps:
      - uses: git-clone
        as: clone-base-chart
        config:
          repoURL: {{ .Values.chartUrl }}
          checkout:
          - branch: main
            path: ./chart
      - uses: git-clone
        config:
          repoURL: {{ .Values.repoUrl }}
          checkout:
          - branch: {{ .Values.git.main }}
            path: ./src
          - branch: env/{{ .Values.application.name }}-prod
            create: true
            path: ./out
      - uses: git-clear
        config:
          path: ./out
      - uses: helm-template
        config:
          releaseName: deploy
          path: ./chart/{{ .Values.chartPath}}
          valuesFiles:
          - ./src/{{.Values.project.path}}/platform/app-values.yaml
          outPath: ./out/manifests.yaml
          namespace: '{{ .Values.application.name }}-prod'
          setValues:
            - key: image.tag
              value: "\"{{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }}\""
            - key: kargo.stage
              value: prod
            - key: ingress.root_domain
              value: akpdemoapps.link
            - key: project.name
              value: '{{ .Values.application.name }}'
            - key: application.name
              value: '{{ .Values.application.name }}'
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: "Promote {{ printf "%s ${{ imageFrom('%s').Tag }}" .Values.application.name .Values.image.repository }} to prod [skip ci]"
      - uses: git-push
        as: push
        config:
          path: ./out
          generateTargetBranch: true
      - uses: git-open-pr
        as: open-pr
        config:
          repoURL: {{ .Values.repoUrl }}
          createTargetBranch: true
          sourceBranch: {{`${{ outputs['push'].branch }}`}}
          targetBranch: env/{{ .Values.application.name }}-prod
      {{ if .Values.notifications.slack.enabled }}
      - uses: send-message
        config:
          channel:
            kind: MessageChannel
            name: kargo-notifications
          message: |
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Kargo Approval Needed* :eyes:"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Stage:* {{`${{ ctx.stage }}`}}"
                  - type: mrkdwn
                    text: "*Version:* {{ printf "${{ imageFrom('%s').Tag }}" .Values.image.repository }}"
                  - type: mrkdwn
                    text: "*Pull Request:* <{{`${{ outputs['open-pr'].pr.url }}`}}|#{{`${{ outputs['open-pr'].pr.id }}`}}>"
            icon_emoji: ":rocket:"
          encodingType: yaml
      {{ end }}
      - uses: git-wait-for-pr
        as: wait-for-pr
        config:
          repoURL: {{ .Values.repoUrl }}
          prNumber: {{`${{ outputs['open-pr'].pr.id }}`}}
      - uses: argocd-update
        config:
          apps:
          - name: '{{ .Values.application.name }}-prod'
            namespace: argocd